<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="your cart">
    </section>
    <section>
    <h2>Payment Information</h2>
    <form>
         <label for ="card-name">Card Name:<span aria-hidden="true">*</span></label>
        <input type="text" id="card-name" name="card-name" required>
        <label for="card-number">Card No:<span aria-hidden="true">*</span></label>
        <input type="text" name="card-number" id="card-number" required aria-describedby="card-number-help">
        <p id="card-number-help">Please enter a valid 16-digit card number with no spaces or dashes.</p>
    </section>

</body>

</html>
